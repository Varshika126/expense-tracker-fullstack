<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Expense | Expense Tracker</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
        }
        .card {
            border-radius: 20px;
        }
        .btn-primary {
            background-color: #667eea;
            border: none;
        }
        .btn-primary:hover {
            background-color: #5a67d8;
        }
    </style>
</head>
<body>

<div class="container d-flex justify-content-center align-items-center"
     style="min-height:100vh;">

    <div class="card shadow-lg p-5" style="width:450px;">
        <h3 class="text-center mb-4 fw-bold">➕ Add Expense</h3>

        <form th:action="@{/save}" th:object="${expense}" method="post">

            <div class="mb-3">
                <label class="form-label">Title</label>
                <input type="text"
                       th:field="*{title}"
                       class="form-control"
                       placeholder="Enter title"
                       required>
            </div>

            <div class="mb-3">
                <label class="form-label">Amount</label>
                <input type="number"
                       step="0.01"
                       th:field="*{amount}"
                       class="form-control"
                       placeholder="Enter amount"
                       required>
            </div>

            <div class="mb-3">
                <label class="form-label">Category</label>
                <input type="text"
                       th:field="*{category}"
                       class="form-control"
                       placeholder="Enter category"
                       required>
            </div>

            <div class="mb-4">
                <label class="form-label">Date</label>
                <input type="date"
                       th:field="*{date}"
                       class="form-control"
                       required>
            </div>

            <button class="btn btn-primary w-100">Save Expense</button>

            <div class="text-center mt-3">
                <a th:href="@{/expenses}" class="text-decoration-none">
                    ← Back to Dashboard
                </a>
            </div>

        </form>
    </div>

</div>

</body>
</html>
