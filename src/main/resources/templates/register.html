<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register | Expense Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #43cea2, #185a9d);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card {
            backdrop-filter: blur(15px);
            background: rgba(255,255,255,0.9);
            border-radius: 20px;
        }
    </style>
</head>
<body>

<div class="card shadow-lg p-5" style="width:400px;">
    <h3 class="text-center mb-4 fw-bold">Create Account ✨</h3>

    <form th:action="@{/register}" th:object="${user}" method="post">
        <div class="mb-3">
            <input type="text" th:field="*{username}" class="form-control" placeholder="Username" required>
        </div>

        <div class="mb-3">
            <input type="password" th:field="*{password}" class="form-control" placeholder="Password" required>
        </div>

        <button class="btn btn-success w-100">Register</button>
    </form>

    <p class="text-center mt-3">
        Already have an account?
        <a th:href="@{/login}" class="fw-bold">Login</a>
    </p>
</div>

</body>
</html>
