<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Expense</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">
    <h2>Edit Expense</h2>

    <form th:action="@{/save}" th:object="${expense}" method="post">

        <input type="hidden" th:field="*{id}"/>

        <div class="mb-3">
            <label>Title</label>
            <input type="text" th:field="*{title}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Amount</label>
            <input type="number" step="0.01" th:field="*{amount}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Category</label>
            <input type="text" th:field="*{category}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Date</label>
            <input type="date" th:field="*{date}" class="form-control" required>
        </div>

        <button type="submit" class="btn btn-primary">Update</button>
        <a href="/" class="btn btn-secondary">Back</a>

    </form>
</div>

</body>
</html>
